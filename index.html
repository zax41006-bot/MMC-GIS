<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MMC-GIS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.8.0/ol.css">
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.8.0/dist/ol.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #0b1621; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; }
        .ol-zoom {
            top: auto !important;
            bottom: 30px !important;
            left: auto !important;
            right: 20px !important;
        }
        #mmc-logo {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 2000;
            width: 80px;
            height: 80px;
            background-image: url('MMC.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="mmc-logo"></div>  

    <script>
        var map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({
                    source: new ol.source.OSM()
                })
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([114.1745, 22.3025]),
                zoom: 5
            })
        });

        fetch('https://api.rainviewer.com/public/weather-maps.json')
           .then(response => response.json())
           .then(data => {
               const latestFrame = data.radar.past[data.radar.past.length - 1];
               const radarLayer = new ol.layer.Tile({
                   source: new ol.source.XYZ({
                       url: data.host + latestFrame.path + '/1024/{z}/{x}/{y}/2/1_1.png'
                   ,maxZoom: 7}),
                       crossOrigin: 'anonymous',
                       opacity: 0.5,
                       zIndex: 100
               });
               map.addLayer(radarLayer);
           })
           .catch(err => console.error("Radar failed to load:", err));



        const lonLat = [113.55, 22.17];
        const trackSource = new ol.source.Vector();
        const vectorLayer = new ol.layer.Vector({
            source: trackSource,
            zIndex: 10
        });
        map.addLayer(vectorLayer);

        const macaoMarker = new ol.Feature({
            geometry: new ol.geom.Point(ol.proj.fromLonLat(lonLat)),
            name: '澳門 Macao'
        });

        macaoMarker.setStyle(new ol.style.Style({
            image: new ol.style.Circle({
                radius: 8,
                fill: new ol.style.Fill({ color: '#ff0000' }),
                stroke: new ol.style.Stroke({ color: '#ffffff', width: 2 })
            })
        }));

        trackSource.addFeature(macaoMarker);
    </script>
</body>
</html>
